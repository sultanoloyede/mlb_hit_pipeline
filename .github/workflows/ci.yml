name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # No MOTHERDUCK_TOKEN in CI -> everything targets the local DuckDB file
      - name: EL — dlt heartbeat
        run: python ingestion/pipelines.py heartbeat

      # CI has no baseball data: compile everything (catches SQL/jinja
      # errors), then build only the heartbeat path end to end
      - name: T — dbt compile + heartbeat build
        run: |
          dbt deps
          dbt compile --profiles-dir . --target dev
          dbt build --profiles-dir . --target dev --select stg_heartbeat
        working-directory: transform
