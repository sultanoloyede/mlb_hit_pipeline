name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # No MOTHERDUCK_TOKEN in CI -> everything targets the local DuckDB file
      - name: EL — dlt heartbeat
        run: python ingestion/pipelines.py heartbeat

      - name: T — dbt build + tests
        run: dbt build --profiles-dir . --target dev
        working-directory: transform
