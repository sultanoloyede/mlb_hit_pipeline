name: daily

on:
  schedule:
    - cron: "0 16 * * *"   # 16:00 UTC = noon ET, see PLAN.md §5
  workflow_dispatch:        # manual trigger for testing

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: EL — heartbeat
        run: python ingestion/pipelines.py heartbeat

      - name: EL — statcast (yesterday)
        run: python ingestion/pipelines.py statcast

      - name: EL — mlb stats api (results window + today's slate)
        run: python ingestion/pipelines.py statsapi

      - name: EL — WAR snapshot (baseball-reference)
        run: python ingestion/pipelines.py war

      - name: T — dbt build + tests
        run: |
          dbt deps
          dbt build --profiles-dir . --target prod
        working-directory: transform

      - name: Source freshness
        run: dbt source freshness --profiles-dir . --target prod
        working-directory: transform
