name: mlb_hits
version: "0.1.0"
profile: mlb_hits

model-paths: ["models"]
test-paths: ["tests"]

models:
  mlb_hits:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
    ml:
      +materialized: table
      +schema: ml
    output:
      # views over the append-only predictions table, so grading always
      # reflects the latest outcomes without a rebuild
      +materialized: view
      +schema: output
